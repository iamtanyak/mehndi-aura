services:
  - type: web
    name: mehndi-aura
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/health
    disk:
      name: mehndi-aura-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: PORT
        value: 3000
      - key: ADMIN_PASSWORD
        sync: false
      - key: NOTIFY_EMAIL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
