<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Why Black Henna Can Hurt: PPD Risks</title>
  <desc id="desc">Safety poster explaining that black henna can contain PPD and may cause irritation, blisters, burns, scarring and future allergy risk.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff8ef"/>
      <stop offset="0.5" stop-color="#f1d6cd"/>
      <stop offset="1" stop-color="#341d1b"/>
    </linearGradient>
    <linearGradient id="warn" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#8a2f24"/>
      <stop offset="1" stop-color="#cb5475"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1050" cy="104" r="170" fill="#cb5475" opacity="0.22"/>
  <circle cx="132" cy="580" r="230" fill="#efa53a" opacity="0.18"/>
  <rect x="70" y="70" width="470" height="535" rx="42" fill="url(#warn)"/>
  <text x="112" y="158" fill="#fff8ef" font-family="Georgia, serif" font-size="56" font-weight="700">Black henna</text>
  <text x="112" y="218" fill="#fff8ef" font-family="Georgia, serif" font-size="56" font-weight="700">can hurt</text>
  <text x="116" y="274" fill="#ffe7d9" font-family="Arial, sans-serif" font-size="24" font-weight="700">PPD risk awareness</text>
  <path d="M300 330 L405 512 H195 Z" fill="#fff8ef" opacity="0.95"/>
  <text x="286" y="463" fill="#8a2f24" font-family="Arial, sans-serif" font-size="86" font-weight="900">!</text>
  <text x="112" y="558" fill="#ffe7d9" font-family="Arial, sans-serif" font-size="22">Natural henna is brown, not instant black.</text>
  <g transform="translate(610 102)">
    <rect width="500" height="90" rx="24" fill="#fffaf4" opacity="0.95"/>
    <text x="28" y="38" font-size="27" font-family="Georgia, serif" fill="#8a2f24" font-weight="700">It may contain PPD</text>
    <text x="28" y="66" font-size="19" font-family="Arial, sans-serif" fill="#765352">A strong dye used to make designs look very dark.</text>
  </g>
  <g transform="translate(610 218)">
    <rect width="500" height="90" rx="24" fill="#fffaf4" opacity="0.95"/>
    <text x="28" y="38" font-size="27" font-family="Georgia, serif" fill="#8a2f24" font-weight="700">Skin can react days later</text>
    <text x="28" y="66" font-size="19" font-family="Arial, sans-serif" fill="#765352">Itching, soreness, swelling or blisters need care.</text>
  </g>
  <g transform="translate(610 334)">
    <rect width="500" height="90" rx="24" fill="#fffaf4" opacity="0.95"/>
    <text x="28" y="38" font-size="27" font-family="Georgia, serif" fill="#8a2f24" font-weight="700">It can leave lasting problems</text>
    <text x="28" y="66" font-size="19" font-family="Arial, sans-serif" fill="#765352">Some reactions may scar or create future allergy risk.</text>
  </g>
  <g transform="translate(610 450)">
    <rect width="500" height="90" rx="24" fill="#fffaf4" opacity="0.95"/>
    <text x="28" y="38" font-size="27" font-family="Georgia, serif" fill="#8a2f24" font-weight="700">Choose natural henna</text>
    <text x="28" y="66" font-size="19" font-family="Arial, sans-serif" fill="#765352">Ask what is in the paste. Avoid instant black stains.</text>
  </g>
  <text x="610" y="602" font-family="Arial, sans-serif" font-size="21" fill="#fff8ef" font-weight="700">Mehndi Aura by Tanya • safety first, always</text>
</svg>
